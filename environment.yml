  - xarray=2023.12.0
  - netCDF4=1.6.5
  - pyproj=3.6.1
  - shapely=2.0.3
  - fiona=1.9.5
  - cartopy=0.22.0
  - matplotlib=3.8.2
  - seaborn=0.13.1
  - requests=2.31.0
  - tqdm=4.66.1
  - jupyterlab=4.1.0
  - ipykernel=6.29.2
  - pip

  - pip:
    - pgmpy==0.1.25
    - shap==0.44.0
